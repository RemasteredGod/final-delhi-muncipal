version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: helpline-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - helpline-network

  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile
    container_name: helpline-whisper
    ports:
      - "5001:5001"
    environment:
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - helpline-network

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: helpline-api
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend:ro
    environment:
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BASE_URL=${BASE_URL}
      - WHISPER_URL=http://whisper:5001
    depends_on:
      redis:
        condition: service_healthy
      whisper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - helpline-network

volumes:
  redis-data:
    driver: local

networks:
  helpline-network:
    driver: bridge
